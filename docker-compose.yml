services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worldport-app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - worldport-network

networks:
  worldport-network:
    driver: bridge
